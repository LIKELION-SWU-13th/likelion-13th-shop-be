<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/layout1}">

<head>
  <title>회원 가입</title>
  <th:block layout:fragment="css"/>
</head>

<body>
<th:block layout:fragment="script">
  <script th:inline="javascript">
    $(document).ready(function(){
      var errorMessage = [[${errorMessage}]];
      if (errorMessage !== '') {
        alert(errorMessage);
      }
    });
  </script>
</th:block>

<div layout:fragment="content">

  <form th:action="@{/members/new}" th:object="${memberFormDto}" method="post" role="form">

    <div class="form-group">
      <label th:for="name">이름</label>
      <div class="input-area">
        <input type="text" th:field="*{name}" placeholder="이름을 입력해주세요">
        <p th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="fieldError">이름 에러</p>
      </div>
    </div>

    <div class="form-group">
      <label th:for="email">이메일 주소</label>
      <div class="input-area">
        <input type="email" th:field="*{email}" placeholder="이메일을 입력해주세요">
        <p th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="fieldError">이메일 에러</p>
      </div>
    </div>

    <div class="form-group">
      <label th:for="password">비밀번호</label>
      <div class="input-area">
        <input type="password" th:field="*{password}" placeholder="비밀번호 입력">
        <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="fieldError">비밀번호 에러</p>
      </div>
    </div>

    <div class="form-group">
      <label th:for="address">주소</label>
      <div class="input-area">
        <input type="text" th:field="*{address}" placeholder="주소를 입력해주세요">
        <p th:if="${#fields.hasErrors('address')}" th:errors="*{address}" class="fieldError">주소 에러</p>
      </div>
    </div>

    <div class="center">
      <button type="submit">제출</button>
    </div>

    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

  </form>

</div>
</body>
</html>
