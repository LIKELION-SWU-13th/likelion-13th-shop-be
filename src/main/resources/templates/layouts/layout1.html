<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">

<head>
  <meta charset="UTF-8">
  <title>회원가입 레이아웃</title>

  <!-- 💡 기본 정돈된 폼 스타일 -->
  <style>
    body {
      font-family: sans-serif;
      font-size: 16px;
      padding: 30px;
      line-height: 1.5;
    }

    form {
      max-width: 600px;
    }

    .form-group {
      display: flex;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .form-group label {
      width: 100px;
      margin-right: 10px;
      font-weight: bold;
    }

    .input-area {
      flex: 1;
    }

    .input-area input {
      width: 100%;
      padding: 6px;
      font-size: 1rem;
      margin-bottom: 4px;
    }

    .fieldError {
      color: #bd2130;
      font-size: 0.9em;
    }

    button {
      padding: 8px 16px;
      font-size: 1rem;
      margin-top: 10px;
    }

    .center {
      text-align: center;
    }
  </style>

  <th:block layout:fragment="css"/>
</head>

<body>
<div layout:fragment="content"></div>

<th:block layout:fragment="script"/>
</body>
</html>
