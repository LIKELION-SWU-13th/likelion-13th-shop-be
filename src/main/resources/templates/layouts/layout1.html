<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <title>회원가입 레이아웃</title>

    <style>
        body {
            font-size: 14px;
            padding: 40px;
        }

        form {
            width: 100%;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 10px;
        }

        .form-row {
            display: flex;
            align-items: center;
        }

        label {
            font-size: 15px;
            font-weight: normal;
            margin-right: 6px;
            color: black;
            white-space: nowrap;
        }

        .input-area input {
            border: 1px solid #999;
            font-size: 13px;
            padding: 3px 5px;
            background-color: white;
            width: 220px;
        }

        .fieldError {
            color: red;
            font-size: 15px;
            margin-top: 10px;
            padding-left: 1px;
        }

        button {
            margin-top: 14px;
            background-color: #e0e0e0;
            border: 1px solid #666;
            padding: 5px 10px;
            font-size: 13px;
            font-family: "굴림", sans-serif;
            cursor: pointer;
        }

        .center {
            text-align: center;
        }
    </style>

    <th:block layout:fragment="css"/>
</head>

<body>
<div layout:fragment="content"></div>
<th:block layout:fragment="script"/>
</body>
</html>
